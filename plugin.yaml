name: whatsapp
version: 0.7.0
description: Convert decrypted WhatsApp msgstore.db to per-chat-day transcript markdown
license: MIT

conformance:
  config:
    source_db: tests/fixtures/msgstore.db

creates_dirs:
  - chat/whatsapp
  - inbox/whatsapp

gitignore_patterns:
  - inbox/whatsapp/msgstore.db
  - inbox/whatsapp/msgstore.db.crypt15

config:
  source_db:
    required: true
    description: Path to decrypted msgstore.db (SQLite). Decryption is a separate fetch-role step.
  owner_jid:
    required: false
    description: >-
      Store owner's WhatsApp JID (e.g. 41791234567@s.whatsapp.net). Used to identify outgoing messages.
      When absent, auto-detected from the most frequent attributed from_me sender in the DB;
      falls back to owner@s.whatsapp.net if underivable.
  media_root:
    required: false
    description: >-
      Path to the WhatsApp data dir (the parent of `Media/`) holding the actual
      media files. msgstore.db stores media as paths relative to this dir
      (e.g. Media/WhatsApp Voice Notes/…/x.opus); without media_root those files
      are not found and media is emitted as a bare `[media: <mime>]` placeholder
      with no CAS bytes (so downstream transcription/amenders have nothing to use).
  timezone:
    required: false
    description: IANA timezone name for day-boundary and HH:MM formatting. Defaults to system timezone.
  backup_key_source:
    required: false
    description: >-
      Secret source for the crypt15 backup key, used by the fetch-role decryption
      step (NOT by convert). Formats: bitwarden:<item-id> or
      keyring:<service>:<account>. See keysource.py.
